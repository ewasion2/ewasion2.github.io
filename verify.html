        // -------------------------------------------------------------------
        // get best language from browser (full match, then primary)
        // -------------------------------------------------------------------
        function getBrowserLang() {
            const navLang = navigator.language || navigator.userLanguage || 'en';
            if (dict[navLang]) return navLang;
            const primary = navLang.split('-')[0];
            if (dict[primary]) return primary;
            // special case for zh-TW / zh-CN
            if (primary === 'zh') {
                // if browser reports zh-TW, zh-HK, zh-MO etc we prefer zh-TW if available
                if (navLang === 'zh-TW' || navLang === 'zh-HK' || navLang === 'zh-MO') return 'zh-TW';
                return 'zh';
            }
            return 'en';
        }

        const lang = getBrowserLang();
        const txt = dict[lang] || dict.en;

        // -------------------------------------------------------------------
        // apply translations to DOM (pure, no extra elements)
        // -------------------------------------------------------------------
        function applyTranslations() {
            const label1 = document.querySelector('.label1');
            if (label1) label1.textContent = txt.L1;

            const label2 = document.querySelector('.label2');
            if (label2) {
                const input = document.getElementById('verifyCheck');
                if (input && label2.contains(input)) {
                    // rebuild: keep input, update text node
                    label2.innerHTML = '';
                    label2.appendChild(input);
                    label2.appendChild(document.createTextNode(' ' + txt.L2));
                }
            }

            const small = document.querySelector('.container > small');
            if (small) small.textContent = txt.sm;

            // store for dynamic countdown
            window.__i18n = { ri: txt.ri, tp: txt.tp };
        }

        // -------------------------------------------------------------------
        // replace checkbox listener with translated version
        // -------------------------------------------------------------------
        function attachTranslatedListener() {
            const checkbox = document.getElementById('verifyCheck');
            if (!checkbox) return;

            // clone to wipe previous listeners
            const newCb = checkbox.cloneNode(true);
            checkbox.parentNode.replaceChild(newCb, checkbox);

            newCb.addEventListener('change', function() {
                if (!this.checked) {
                    document.getElementById('countdown').textContent = '';
                    return;
                }
                ga_send_event('verify_check');
                let counter = 3;
                const cd = document.getElementById('countdown');
                const i18n = window.__i18n || { ri: 'Redirecting in {n}...', tp: 'Test passed, redirection started.' };
                cd.textContent = i18n.ri.replace('{n}', counter);

                const interval = setInterval(() => {
                    counter--;
                    if (counter > 0) {
                        cd.textContent = i18n.ri.replace('{n}', counter);
                    } else {
                        clearInterval(interval);
                        cd.textContent = i18n.tp;
                        ga_send_event('redirection_start');
                        setTimeout(() => {
                            window.location.href = window.trackingLink;
                        }, 1000);
                    }
                }, 1000);
            });
        }

        // run after DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                applyTranslations();
                attachTranslatedListener();
            });
        } else {
            applyTranslations();
            attachTranslatedListener();
        }
    })();
